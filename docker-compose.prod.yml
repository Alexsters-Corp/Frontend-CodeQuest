# docker-compose de producción — usa imagen pre-construida desde ghcr.io
# Copiar este archivo a /opt/codequest-frontend/ en el servidor

services:
  frontend:
    image: ghcr.io/${GHCR_ORG:-alexsters-corp}/codequest-frontend:latest
    container_name: codequest-frontend
    restart: unless-stopped
    ports:
      - '5000:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 15s
      timeout: 5s
      retries: 10
