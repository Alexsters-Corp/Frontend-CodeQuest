services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: codequest-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-5000}:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/']
      interval: 15s
      timeout: 5s
      retries: 10
